<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FitTracker Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#090909;--bg2:#111;--bg3:#181818;--bg4:#222;--a:#e8ff00;--t:#f0f0f0;--t2:#777;--t3:#444;--b:#252525;--ok:#00e676;--warn:#ffab40;--err:#ff4444;--push:#ff6b35;--pull:#00b4d8;--legs:#a8ff3e;--r:12px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t)}
button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none}
input,select,textarea{font-family:'DM Sans',sans-serif;width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:8px 11px;color:var(--t);font-size:13px;-webkit-appearance:none;outline:none}
input:focus,select:focus{border-color:var(--a)}
select option{background:var(--bg3)}
.app{height:100%;display:flex;flex-direction:column}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pg{display:none;padding:14px;max-width:600px;margin:0 auto;padding-bottom:80px}
.pg.on{display:block}
/* header */
.hdr{background:var(--bg2);border-bottom:1px solid var(--b);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid var(--a);margin-right:8px}
/* bottom nav */
.bnav{display:flex;background:var(--bg2);border-top:1px solid var(--b);flex-shrink:0}
.bn{flex:1;padding:10px 2px 8px;background:none;border:none;color:var(--t3);font-size:7px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:3px}
.bn .i{font-size:18px;line-height:1}
.bn.on{color:var(--a)}
/* card */
.card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:16px;margin-bottom:12px}
.ct{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--a);margin-bottom:12px}
/* stats */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--bg3);border:1px solid var(--b);border-radius:var(--r);padding:12px;text-align:center}
.sv{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--a);line-height:1}
.sl{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.ss{font-size:9px;color:var(--t2);font-family:'DM Mono',monospace;margin-top:2px}
/* btns */
.btn{padding:9px 16px;border-radius:8px;border:none;font-size:11px;font-weight:700;transition:all .2s;text-transform:uppercase;cursor:pointer}
.btn-p{background:var(--a);color:#000}
.btn-s{background:var(--bg3);color:var(--t);border:1px solid var(--b)}
.btn-f{width:100%}
.btn-sm{padding:5px 10px;font-size:9px}
.icon-btn{padding:8px;border-radius:8px;background:var(--bg3);border:1px solid var(--b);color:var(--t);font-size:16px;cursor:pointer;transition:all .2s}
/* macro bar */
.mb{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:3px}
.mf{height:100%;border-radius:3px;transition:width .5s}
/* input group */
.ig{margin-bottom:10px}
.il{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:4px;display:block}
/* day selector */
.ds{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.db{aspect-ratio:1;border-radius:8px;border:1px solid var(--b);background:var(--bg3);font-size:8px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all .2s;color:var(--t2)}
.db.push{border-color:rgba(255,107,53,.5);color:var(--push)}
.db.pull{border-color:rgba(0,180,216,.5);color:var(--pull)}
.db.legs{border-color:rgba(168,255,62,.5);color:var(--legs)}
.db.on.push{background:var(--push);color:#fff;border-color:var(--push)}
.db.on.pull{background:var(--pull);color:#fff;border-color:var(--pull)}
.db.on.legs{background:var(--legs);color:#000;border-color:var(--legs)}
.db.on.repos{background:var(--bg4);color:var(--t);border-color:var(--t3)}
/* badge */
.bdg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.bdg.push{background:var(--push);color:#fff}
.bdg.pull{background:var(--pull);color:#fff}
.bdg.legs{background:var(--legs);color:#000}
.bdg.repos{background:var(--bg4);color:var(--t2);border:1px solid var(--b)}
/* exercise */
.ex{background:var(--bg3);border:1px solid var(--b);border-radius:var(--r);padding:12px;margin-bottom:8px}
.sh{display:grid;grid-template-columns:22px 1fr 1fr 1fr 28px;gap:4px;margin-bottom:4px}
.sh span{font-size:7px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);font-weight:600;text-align:center}
.sr{display:grid;grid-template-columns:22px 1fr 1fr 1fr 28px;gap:4px;align-items:center;margin-bottom:4px}
.sn{width:22px;height:22px;background:var(--bg4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--t2);font-family:'DM Mono',monospace}
.si{background:var(--bg4);border:1px solid var(--b);border-radius:5px;padding:5px 3px;color:var(--t);font-size:11px;font-family:'DM Mono',monospace;text-align:center}
.si:focus{outline:none;border-color:var(--a)}
.sd{width:26px;height:26px;border-radius:50%;border:1px solid var(--b);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s}
.sd.ok{background:var(--ok);border-color:var(--ok)}
.sens{display:flex;gap:4px;margin-top:6px}
.sb{flex:1;padding:4px 2px;border-radius:5px;border:1px solid var(--b);background:var(--bg4);color:var(--t2);font-size:8px;cursor:pointer;transition:all .2s}
.sb.e{background:var(--ok);color:#000;border-color:var(--ok)}
.sb.o{background:var(--warn);color:#000;border-color:var(--warn)}
.sb.d{background:var(--err);color:#fff;border-color:var(--err)}
.sb.m{background:#9c27b0;color:#fff;border-color:#9c27b0}
/* water */
.wring{position:relative;width:120px;height:120px}
.wring svg{transform:rotate(-90deg)}
.wc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.wv{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--pull);line-height:1}
.wu{font-size:9px;color:var(--t2);text-transform:uppercase}
.wbtn{background:var(--bg3);border:1px solid var(--pull);border-radius:8px;padding:6px 12px;color:var(--pull);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.wbtn:hover{background:var(--pull);color:#000}
/* food */
.fi{background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .2s}
.fi:hover{border-color:var(--a)}
/* meal */
.ms{margin-bottom:12px}
.mst{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);padding:6px 0;border-bottom:1px solid var(--b);margin-bottom:8px}
.me{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b)}
.me:last-child{border-bottom:none}
/* poids */
.we{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b)}
.we:last-child{border-bottom:none}
/* modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.mo{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.mot{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--a);margin-bottom:12px}
.ng{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.nc{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
/* scanner */
#scan-wrap{position:fixed;inset:0;background:#000;z-index:500;display:none;flex-direction:column}
#scan-wrap.on{display:flex}
#interactive{flex:1;position:relative;overflow:hidden}
#interactive video,#interactive canvas.drawingBuffer{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.sf{width:240px;height:160px;border:2px solid var(--a);border-radius:8px;position:relative}
.sl2{position:absolute;width:100%;height:2px;background:var(--a);animation:sc 2s linear infinite}
@keyframes sc{0%{top:0}100%{top:100%}}
.sc-close{position:absolute;top:20px;right:20px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);border-radius:50%;width:40px;height:40px;color:#fff;font-size:18px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
/* login */
#login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:200;background:radial-gradient(ellipse at top,#1a1a00,var(--bg) 60%)}
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px;margin-bottom:14px}
.pc{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:18px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.pc:hover{border-color:var(--a);transform:translateY(-2px)}
.pa{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 8px;border:2px solid var(--b)}
.apc{background:var(--bg2);border:1px dashed var(--b);border-radius:var(--r);padding:18px 14px;text-align:center;cursor:pointer;transition:all .2s;color:var(--t3);font-size:12px}
.apc:hover{border-color:var(--a);color:var(--a)}
/* emoji/color pickers */
.epg{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.eo{aspect-ratio:1;border-radius:8px;border:1px solid var(--b);background:var(--bg3);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.eo.on,.eo:hover{border-color:var(--a)}
.cpg{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.co{aspect-ratio:1;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s}
.co.on{border-color:#fff;transform:scale(1.2)}
/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--a);color:#000;padding:8px 18px;border-radius:30px;font-size:11px;font-weight:700;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
/* misc */
.empty{text-align:center;padding:30px 16px;color:var(--t3)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
canvas{width:100%;height:120px;display:block}
.pos{color:var(--ok)}.neg{color:var(--err)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div id="root"></div>
<div id="scan-wrap">
  <div id="interactive">
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">
      <div class="sf"><div class="sl2"></div></div>
      <div style="color:#fff;font-size:12px;margin-top:16px;opacity:.8">Pointez vers le code-barres</div>
    </div>
  </div>
  <button class="sc-close" id="sc-close">✕</button>
</div>
<div class="toast" id="toast"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── constants ──────────────────────────────────────────
const EMOJIS=['💪','🏋️','🔥','⚡','🎯','🦁','🐺','👊','🏃','🌟','💎','🦅','🐉','⚔️','🛡️','🎖️','🚀','💫'];
const COLORS=['#e8ff00','#ff6b35','#00b4d8','#a8ff3e','#ff4081','#7c4dff','#00e676','#ff9800','#00bcd4','#f44336','#9c27b0','#4caf50'];
const PROG_DEF={0:'Push',1:'Pull',2:'Legs',3:'Push',4:'Pull',5:'Legs',6:'Repos'};
const DAYS_FR=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS_FR=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const EXERCICES={
  Push:[
    {name:'Développé couché haltères',sets:5,reps:'8-12',note:'Priorité pecto'},
    {name:'Développé incliné barre',sets:4,reps:'8-12',note:'Haut pecto'},
    {name:'Câbles croisés basse poulie',sets:4,reps:'12-15',note:'Étirement maximal'},
    {name:'Dips lestés',sets:4,reps:'10-12',note:'Pecto + triceps'},
    {name:'Développé militaire haltères',sets:4,reps:'8-12',note:'Épaules'},
    {name:'Élévations latérales',sets:3,reps:'15-20',note:'Commencer côté droit'},
    {name:'Skull crushers',sets:3,reps:'10-12',note:'Épaisseur triceps'},
    {name:'Pushdown câble unilatéral',sets:3,reps:'12-15',note:'Rééquilibrage'},
    {name:'Gainage + Hip flexors',sets:3,reps:'45s',note:'Postural obligatoire'},
    {name:'Mollets debout unilatéral',sets:3,reps:'15-20',note:'Full amplitude'},
  ],
  Pull:[
    {name:'Rowing barre',sets:5,reps:'6-10',note:'Priorité épaisseur dos'},
    {name:'Rowing haltère unilatéral',sets:4,reps:'10-12',note:'Rhomboïdes'},
    {name:'Tractions',sets:4,reps:'8-12',note:'Largeur dos'},
    {name:'Tirage horizontal câble serré',sets:4,reps:'12-15',note:'Coudes près du corps'},
    {name:'Shrugs haltères',sets:3,reps:'15-20',note:'Épaisseur trapèzes'},
    {name:'Pull-over haltère',sets:3,reps:'12',note:'Grand dorsal'},
    {name:'Curl barre',sets:4,reps:'10-12',note:''},
    {name:'Curl marteau unilatéral',sets:3,reps:'12',note:'Rééquilibrage bras'},
    {name:'Gainage + Hip flexors',sets:3,reps:'45s',note:'Postural obligatoire'},
    {name:'Mollets assis',sets:3,reps:'20-25',note:'Soléaire profond'},
  ],
  Legs:[
    {name:'Squat barre',sets:5,reps:'8-12',note:"Genoux dans l'axe"},
    {name:'Hack squat / Presse inclinée',sets:4,reps:'10-12',note:''},
    {name:'Leg extension',sets:3,reps:'15-20',note:'Isolation quadriceps'},
    {name:'Leg curl couché',sets:4,reps:'10-12',note:'Ischio'},
    {name:'Romanian Deadlift',sets:4,reps:'10-12',note:'Ischio + bas du dos'},
    {name:'Fentes marchées haltères',sets:3,reps:'12 chq',note:'Contrôle valgus genou'},
    {name:'Mollets debout pointes droites',sets:3,reps:'15-25',note:'Tempo 2-2-3'},
    {name:'Mollets debout pointes dehors',sets:2,reps:'15-25',note:'Portion interne'},
    {name:'Mollets assis',sets:3,reps:'15-25',note:'Soléaire profond'},
  ],
  Repos:[]
};

// ── storage helpers ────────────────────────────────────
const todayStr=()=>new Date().toISOString().split('T')[0];
const gd=(pid,k,def)=>{const a=JSON.parse(localStorage.getItem('ft_'+pid)||'{}');return a[k]!==undefined?a[k]:def};
const sd=(pid,k,v)=>{const a=JSON.parse(localStorage.getItem('ft_'+pid)||'{}');a[k]=v;localStorage.setItem('ft_'+pid,JSON.stringify(a))};
const useStore=(pid,key,def)=>{
  const [val,setVal]=useState(()=>gd(pid,key,def));
  const set=useCallback(v=>{const nv=typeof v==='function'?v(gd(pid,key,def)):v;sd(pid,key,nv);setVal(nv)},[pid,key]);
  return[val,set];
};

// ── toast ──────────────────────────────────────────────
let toastTimer;
const showToast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('on'),2500)};

// ── chart helpers ──────────────────────────────────────
const drawLine=(canvas,data,goal,color='#e8ff00')=>{
  if(!canvas||!data.length)return;
  const ctx=canvas.getContext('2d');const W=canvas.offsetWidth||300,H=canvas.offsetHeight||120;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);
  ctx.clearRect(0,0,W,H);
  if(data.length<2){ctx.fillStyle='#444';ctx.font='11px DM Sans';ctx.textAlign='center';ctx.fillText('Pas encore assez de données',W/2,H/2);return}
  const vals=data.map(d=>d.val);
  const allV=goal?[...vals,goal]:vals;
  const mn=Math.min(...allV)-0.5,mx=Math.max(...allV)+0.5;
  const p={t:8,r:8,b:16,l:32};const gW=W-p.l-p.r,gH=H-p.t-p.b;
  const xP=i=>p.l+(i/(vals.length-1))*gW;const yP=v=>p.t+(1-(v-mn)/(mx-mn))*gH;
  for(let y=0;y<=3;y++){const yy=p.t+(y/3)*gH;ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,yy);ctx.lineTo(W-p.r,yy);ctx.stroke();ctx.fillStyle='#444';ctx.font='8px DM Mono';ctx.textAlign='right';ctx.fillText((mx-(y/3)*(mx-mn)).toFixed(1),p.l-3,yy+3)}
  const gr=ctx.createLinearGradient(0,p.t,0,H);gr.addColorStop(0,color+'26');gr.addColorStop(1,color+'00');
  ctx.beginPath();ctx.moveTo(xP(0),yP(vals[0]));vals.slice(1).forEach((_,i)=>ctx.lineTo(xP(i+1),yP(vals[i+1])));ctx.lineTo(xP(vals.length-1),H-p.b);ctx.lineTo(xP(0),H-p.b);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
  ctx.beginPath();ctx.moveTo(xP(0),yP(vals[0]));vals.slice(1).forEach((_,i)=>ctx.lineTo(xP(i+1),yP(vals[i+1])));ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  vals.forEach((v,i)=>{ctx.beginPath();ctx.arc(xP(i),yP(v),3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill()});
  if(goal&&goal>=mn&&goal<=mx){ctx.beginPath();ctx.moveTo(p.l,yP(goal));ctx.lineTo(W-p.r,yP(goal));ctx.strokeStyle='rgba(0,230,118,.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([])}
};

const drawBars=(canvas,data,goal,color)=>{
  if(!canvas)return;
  const ctx=canvas.getContext('2d');const W=canvas.offsetWidth||300,H=canvas.offsetHeight||120;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);
  ctx.clearRect(0,0,W,H);
  const vals=data.map(d=>d.val);const mx=Math.max(...vals,goal||1,1);
  const p={t:8,r:8,b:18,l:8};const gW=W-p.l-p.r,gH=H-p.t-p.b;const bw=gW/data.length;
  data.forEach((d,i)=>{
    const x=p.l+i*bw+bw*.1;const bW=bw*.8;const bH=(d.val/mx)*gH;const y=p.t+gH-bH;
    ctx.fillStyle=d.val>=goal?'rgba(0,230,118,.2)':color+'22';ctx.fillRect(x,y,bW,bH);
    ctx.fillStyle=d.val>=goal?'#00e676':color;ctx.fillRect(x,y,bW,3);
    const dd=new Date(d.date);ctx.fillStyle='#555';ctx.font='8px DM Mono';ctx.textAlign='center';ctx.fillText(DAYS_FR[dd.getDay()],x+bW/2,H-p.b+12);
    if(d.val>0){ctx.fillStyle=color;ctx.font='7px DM Mono';ctx.fillText(d.val,x+bW/2,y-2)}
  });
};

// ── MacroBar ───────────────────────────────────────────
const MacroBar=({label,cur,goal,color,unit=''})=>{
  const pct=Math.min(100,goal?Math.round((cur/goal)*100):0);
  return <div className="macro-row" style={{marginBottom:8}}>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
      <span style={{fontSize:10,fontWeight:600}}>{label}</span>
      <span style={{fontSize:9,color:'var(--t2)',fontFamily:'DM Mono'}}>{Math.round(cur)}{unit} / {goal}{unit} ({pct}%)</span>
    </div>
    <div className="mb"><div className="mf" style={{width:pct+'%',background:color}}/></div>
  </div>;
};

// ── MacroSummary ───────────────────────────────────────
const MacroSummary=({meals,obj})=>{
  const t=meals.reduce((a,m)=>({kcal:a.kcal+(m.kcal||0),prot:a.prot+(m.prot||0),gluc:a.gluc+(m.gluc||0),lip:a.lip+(m.lip||0)}),{kcal:0,prot:0,gluc:0,lip:0});
  return <>
    <MacroBar label="Calories" cur={t.kcal} goal={obj.kcal||2800} color="#e8ff00" unit="kcal"/>
    <MacroBar label="Protéines" cur={t.prot} goal={obj.prot||150} color="#ff6b35" unit="g"/>
    <MacroBar label="Glucides" cur={t.gluc} goal={obj.gluc||300} color="#00b4d8" unit="g"/>
    <MacroBar label="Lipides" cur={t.lip} goal={obj.lip||80} color="#a8ff3e" unit="g"/>
  </>;
};

// ── WeekSelector ───────────────────────────────────────
const WeekSelector=({currentDay,prog,onSelect})=><div className="ds">
  {[1,2,3,4,5,6,0].map(d=>{const t=prog[d]||'Repos';return <button key={d} className={`db ${t.toLowerCase()} ${d===currentDay?'on':''}`} onClick={()=>onSelect(d)}>
    <span style={{fontSize:7}}>{DAYS_FR[d]}</span>
    <span>{t==='Repos'?'😴':t.slice(0,1)}</span>
  </button>})}
</div>;

// ── Dashboard ──────────────────────────────────────────
const Dashboard=({pid,currentDay,setCurrentDay})=>{
  const [poids]=useStore(pid,'poids',[]);
  const [meals]=useStore(pid,'meals',{});
  const [obj]=useStore(pid,'objectifs',{kcal:2800,prot:150,gluc:300,lip:80,water:2000,poids_objectif:82});
  const [sessions]=useStore(pid,'sessions',[]);
  const [wlog]=useStore(pid,'water_log',{});
  const [prog]=useStore(pid,'programme',PROG_DEF);
  const chartRef=useRef(null);
  const lastP=poids.length>0?poids[poids.length-1]:null;
  const todayMeals=meals[todayStr()]||[];
  const kcal=todayMeals.reduce((a,m)=>a+(m.kcal||0),0);
  const water=wlog[todayStr()]||0;
  const streak=()=>{let s=0;const d=new Date();for(let i=0;i<30;i++){if(sessions.some(x=>x.date===d.toISOString().split('T')[0]))s++;else if(i>0)break;d.setDate(d.getDate()-1)}return s};
  const now=new Date();const monthStr=now.toISOString().slice(0,7);
  useEffect(()=>drawLine(chartRef.current,poids.slice(-14),obj.poids_objectif),[poids,obj]);
  const wPct=Math.min(100,Math.round((water/(obj.water||2000))*100));
  const dayType=prog[currentDay]||'Repos';
  return <div className="pg on" id="page-dashboard">
    <div className="sg">
      <div className="sc"><div className="sv">{lastP?lastP.val:'--'}</div><div className="sl">Poids (kg)</div><div className="ss">obj: {obj.poids_objectif||'--'} kg</div></div>
      <div className="sc"><div className="sv">{kcal}</div><div className="sl">Kcal aujourd'hui</div><div className="ss">/ {obj.kcal||2800}</div></div>
      <div className="sc"><div className="sv">{water}</div><div className="sl">Eau (ml)</div><div className="ss">/ {obj.water||2000} ml</div></div>
      <div className="sc"><div className="sv">{streak()}</div><div className="sl">Streak 🔥</div><div className="ss">{sessions.filter(s=>s.date.startsWith(monthStr)).length} ce mois</div></div>
    </div>
    <div className="card"><div className="ct">Nutrition aujourd'hui</div><MacroSummary meals={todayMeals} obj={obj}/></div>
    <div className="card">
      <div className="ct">Eau aujourd'hui</div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}><span>{water} ml</span><span>{wPct}%</span></div>
      <div className="mb"><div className="mf" style={{width:wPct+'%',background:'#00b4d8'}}/></div>
      <div style={{fontSize:10,color:'var(--t2)',marginTop:4}}>Objectif : {obj.water||2000} ml/jour</div>
    </div>
    <div className="card">
      <div className="ct">Cette semaine</div>
      <WeekSelector currentDay={currentDay} prog={prog} onSelect={setCurrentDay}/>
      <div style={{textAlign:'center',padding:'6px 0'}}>
        <span className={`bdg ${dayType.toLowerCase()}`}>{dayType}</span>
        <div style={{fontSize:11,color:'var(--t2)'}}>{dayType==='Repos'?'Récupération 💤':`${EXERCICES[dayType]?.length||0} exercices`}</div>
      </div>
    </div>
    <div className="card"><div className="ct">Évolution poids</div><canvas ref={chartRef}/></div>
  </div>;
};

// ── FoodSearch ─────────────────────────────────────────
const FoodSearch=({pid,onAdd})=>{
  const [q,setQ]=useState('');const [results,setResults]=useState([]);const [loading,setLoading]=useState(false);
  const [selected,setSelected]=useState(null);const [qty,setQty]=useState(100);const [moment,setMoment]=useState('Déjeuner');
  const n100g=p=>{const n=p.nutriments||{};return{kcal:Math.round(n['energy-kcal_100g']||n['energy_100g']/4.18||0),prot:Math.round((n['proteins_100g']||0)*10)/10,gluc:Math.round((n['carbohydrates_100g']||0)*10)/10,lip:Math.round((n['fat_100g']||0)*10)/10,fibres:Math.round((n['fiber_100g']||0)*10)/10,sel:Math.round((n['salt_100g']||0)*100)/100,sucres:Math.round((n['sugars_100g']||0)*10)/10}};
  const search=async()=>{if(!q.trim())return;setLoading(true);setResults([]);
    try{const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&action=process&json=1&page_size=8&lc=fr`);
      const d=await r.json();setResults(d.products||[]);}catch(e){showToast('Erreur réseau')}finally{setLoading(false)}};
  const addFood=()=>{if(!selected)return;const n=n100g(selected);const r=qty/100;
    onAdd({id:Date.now(),name:selected.product_name||'Produit',brand:selected.brands||'',qty,moment,kcal:Math.round(n.kcal*r),prot:Math.round(n.prot*r*10)/10,gluc:Math.round(n.gluc*r*10)/10,lip:Math.round(n.lip*r*10)/10,fibres:Math.round(n.fibres*r*10)/10,sel:Math.round(n.sel*r*100)/100});
    setSelected(null);setQ('');setResults([]);showToast('Ajouté ✅')};
  const openScan=()=>{
    if(!window.Quagga){showToast('Scanner indisponible');return}
    const wrap=document.getElementById('scan-wrap');wrap.classList.add('on');
    Quagga.init({inputStream:{name:'Live',type:'LiveStream',target:document.getElementById('interactive'),constraints:{facingMode:'environment'}},decoder:{readers:['ean_reader','ean_8_reader','upc_reader','code_128_reader']},locate:true},err=>{if(err){showToast('Caméra indisponible');wrap.classList.remove('on');return}Quagga.start()});
    Quagga.onDetected(async res=>{const code=res.codeResult.code;Quagga.stop();wrap.classList.remove('on');showToast('Recherche...');
      try{const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);const d=await r.json();if(d.status===1){setResults([d.product]);}else showToast('Produit non trouvé')}catch(e){showToast('Erreur réseau')}})};
  document.getElementById('sc-close').onclick=()=>{try{Quagga.stop()}catch(e){}document.getElementById('scan-wrap').classList.remove('on')};
  const n=selected?n100g(selected):null;const r=qty/100;
  return <>
    <div className="ig"><label className="il">Moment</label>
      <select value={moment} onChange={e=>setMoment(e.target.value)}>
        {['Petit déjeuner','Collation matin','Déjeuner','Collation après-midi','Dîner','Avant dodo'].map(m=><option key={m}>{m}</option>)}
      </select>
    </div>
    <div style={{display:'flex',gap:6,marginBottom:10}}>
      <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&search()} placeholder="Rechercher un aliment..." style={{flex:1}}/>
      <button className="icon-btn" onClick={search}>🔍</button>
      <button className="icon-btn" onClick={openScan} title="Scanner code-barres">📷</button>
    </div>
    {loading&&<div style={{textAlign:'center',padding:12,color:'var(--t2)',fontSize:12}}><span className="spin"/>Recherche...</div>}
    {!selected&&results.map((p,i)=>{const n=n100g(p);return <div key={i} className="fi" onClick={()=>{setSelected(p);setQty(100)}}>
      <div>
        <div style={{fontSize:12,fontWeight:600}}>{p.product_name||'Produit inconnu'}</div>
        <div style={{fontSize:10,color:'var(--t2)'}}>{p.brands||''}</div>
        <div style={{fontSize:9,color:'var(--t2)',fontFamily:'DM Mono'}}>P:{n.prot}g G:{n.gluc}g L:{n.lip}g F:{n.fibres}g /100g</div>
      </div>
      <div style={{fontFamily:'Bebas Neue',fontSize:20,color:'var(--a)',marginLeft:8,textAlign:'center'}}>{n.kcal}<br/><span style={{fontSize:9,color:'var(--t2)'}}>kcal</span></div>
    </div>})}
    {selected&&n&&<div className="card" style={{marginTop:8}}>
      <div style={{fontWeight:700,marginBottom:4}}>{selected.product_name}</div>
      <div style={{fontSize:10,color:'var(--t2)',marginBottom:10}}>{selected.brands}</div>
      <div className="ig"><label className="il">Quantité (g/ml)</label><input type="number" value={qty} onChange={e=>setQty(Number(e.target.value)||100}/></div>
      <div className="ng">
        {[{l:'Kcal',v:Math.round(n.kcal*r),c:'#e8ff00'},{l:'Protéines',v:Math.round(n.prot*r*10)/10+' g',c:'#ff6b35'},{l:'Glucides',v:Math.round(n.gluc*r*10)/10+' g',c:'#00b4d8'},{l:'Lipides',v:Math.round(n.lip*r*10)/10+' g',c:'#a8ff3e'},{l:'Fibres',v:Math.round(n.fibres*r*10)/10+' g',c:'#888'},{l:'Sel',v:Math.round(n.sel*r*100)/100+' g',c:'#777'}].map(x=><div key={x.l} className="nc"><div style={{fontFamily:'DM Mono',fontSize:13,fontWeight:600,color:x.c}}>{x.v}</div><div style={{fontSize:8,color:'var(--t2)',textTransform:'uppercase',letterSpacing:.5,marginTop:2}}>{x.l}</div></div>)}
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-s" style={{flex:1}} onClick={()=>{setSelected(null);setResults([])}}>← Retour</button>
        <button className="btn btn-p" style={{flex:1}} onClick={addFood}>Ajouter</button>
      </div>
    </div>}
  </>;
};

// ── ManualEntry ────────────────────────────────────────
const ManualEntry=({onAdd})=>{
  const [f,setF]=useState({name:'',qty:'',kcal:'',prot:'',gluc:'',lip:'',fibres:''});
  const add=()=>{if(!f.name){showToast('Entre un nom !');return}
    onAdd({id:Date.now(),name:f.name,qty:Number(f.qty)||100,moment:'Autre',kcal:Number(f.kcal)||0,prot:Number(f.prot)||0,gluc:Number(f.gluc)||0,lip:Number(f.lip)||0,fibres:Number(f.fibres)||0});
    setF({name:'',qty:'',kcal:'',prot:'',gluc:'',lip:'',fibres:''});showToast('Ajouté ✅')};
  return <details><summary style={{fontSize:11,fontWeight:700,color:'var(--t2)',cursor:'pointer',textTransform:'uppercase',letterSpacing:.5}}>+ Saisie manuelle</summary>
    <div style={{marginTop:12}}>
      <div className="ig"><label className="il">Nom</label><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="Riz + poulet..."/></div>
      <div className="g2">
        {[['qty','Quantité (g)','150'],['kcal','Kcal','350'],['prot','Protéines (g)','30'],['gluc','Glucides (g)','40'],['lip','Lipides (g)','8'],['fibres','Fibres (g)','3']].map(([k,l,ph])=><div key={k} className="ig"><label className="il">{l}</label><input type="number" value={f[k]} onChange={e=>setF({...f,[k]:e.target.value})} placeholder={ph}/></div>)}
      </div>
      <button className="btn btn-p btn-f" onClick={add}>Ajouter</button>
    </div>
  </details>;
};

// ── Nutrition ──────────────────────────────────────────
const Nutrition=({pid})=>{
  const [meals,setMeals]=useStore(pid,'meals',{});
  const [obj]=useStore(pid,'objectifs',{kcal:2800,prot:150,gluc:300,lip:80});
  const todayMeals=meals[todayStr()]||[];
  const save=list=>{const m={...meals};m[todayStr()]=list;setMeals(m)};
  const add=entry=>save([...todayMeals,entry]);
  const del=id=>save(todayMeals.filter(m=>m.id!==id));
  const MOMENTS=['Petit déjeuner','Collation matin','Déjeuner','Collation après-midi','Dîner','Avant dodo','Autre'];
  return <div className="pg" id="page-nutrition">
    <div className="card"><div className="ct">Objectifs du jour</div><MacroSummary meals={todayMeals} obj={obj}/></div>
    <div className="card"><div className="ct">Ajouter un aliment</div><FoodSearch pid={pid} onAdd={add}/></div>
    <div className="card"><div className="ct">Saisie manuelle</div><ManualEntry onAdd={add}/></div>
    <div className="card">
      <div className="ct">Journal du jour</div>
      {todayMeals.length===0&&<div className="empty"><div style={{fontSize:36}}>🍽</div><div style={{fontSize:12}}>Aucun repas enregistré</div></div>}
      {MOMENTS.map(mo=>{const items=todayMeals.filter(m=>m.moment===mo);if(!items.length)return null;
        const moKcal=items.reduce((a,m)=>a+(m.kcal||0),0);
        return <div key={mo} className="ms">
          <div className="mst">{mo}<span style={{float:'right',color:'var(--a)',fontFamily:'DM Mono'}}>{moKcal} kcal</span></div>
          {items.map(m=><div key={m.id} className="me">
            <div><div style={{fontSize:12,fontWeight:600}}>{m.name}</div><div style={{fontSize:10,color:'var(--t2)',fontFamily:'DM Mono'}}>{m.qty}g · P:{m.prot}g G:{m.gluc}g L:{m.lip}g</div></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:18,color:'var(--a)'}}>{m.kcal}<span style={{fontSize:8,color:'var(--t2)'}}>kcal</span></div>
              <button onClick={()=>del(m.id)} style={{background:'none',color:'var(--t3)',fontSize:15,padding:'0 4px'}}>×</button>
            </div>
          </div>)}
        </div>})}
    </div>
  </div>;
};

// ── Eau ────────────────────────────────────────────────
const Eau=({pid})=>{
  const [wlog,setWlog]=useStore(pid,'water_log',{});
  const [obj,setObj]=useStore(pid,'objectifs',{water:2000});
  const goal=obj.water||2000;
  const amount=wlog[todayStr()]||0;
  const chartRef=useRef(null);
  const add=ml=>{const w={...wlog};w[todayStr()]=Math.max(0,(w[todayStr()]||0)+ml);setWlog(w)};
  const saveGoal=v=>{setObj({...obj,water:v});showToast('Objectif eau sauvegardé 💧')};
  const pct=Math.min(1,amount/goal);const circ=2*Math.PI*54;
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const ds=d.toISOString().split('T')[0];return{date:ds,val:wlog[ds]||0}});
  useEffect(()=>drawBars(chartRef.current,last7,goal,'#00b4d8'),[wlog,obj]);
  const glasses=Math.floor(amount/250);const totalG=Math.ceil(goal/250);
  return <div className="pg" id="page-eau">
    <div className="card">
      <div className="ct">Hydratation du jour</div>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
        <div className="wring">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="54" fill="none" stroke="#1a1a1a" strokeWidth="10"/>
            <circle cx="60" cy="60" r="54" fill="none" stroke="#00b4d8" strokeWidth="10" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" style={{transition:'stroke-dashoffset .5s',transform:'rotate(-90deg)',transformOrigin:'center'}}/>
          </svg>
          <div className="wc"><div className="wv">{amount}</div><div className="wu">ml</div></div>
        </div>
        <div style={{fontSize:11,color:'var(--t2)'}}>Objectif : {goal} ml</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
          {[150,200,250,330,500].map(v=><button key={v} className="wbtn" onClick={()=>add(v)}>+{v}ml</button>)}
          <button className="wbtn" onClick={()=>add(-150)} style={{borderColor:'var(--err)',color:'var(--err)'}}>-150ml</button>
        </div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'center'}}>
          {Array.from({length:totalG},(_,i)=><span key={i} style={{fontSize:18,opacity:i<glasses?1:.25,cursor:'pointer'}} onClick={()=>add(250)}>🥤</span>)}
        </div>
      </div>
    </div>
    <div className="card">
      <div className="ct">Objectif eau</div>
      <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
        <div className="ig" style={{flex:1,margin:0}}><label className="il">Objectif (ml/jour)</label><input type="number" defaultValue={goal} id="wgi"/></div>
        <button className="btn btn-p" onClick={()=>saveGoal(Number(document.getElementById('wgi').value)||2000)}>OK</button>
      </div>
    </div>
    <div className="card"><div className="ct">7 derniers jours</div><canvas ref={chartRef}/></div>
  </div>;
};

// ── Sport ──────────────────────────────────────────────
const Sport=({pid,currentDay,setCurrentDay})=>{
  const [prog]=useStore(pid,'programme',PROG_DEF);
  const [sessions,setSessions]=useStore(pid,'sessions',[]);
  const [sdata,setSdata]=useState({});
  const type=prog[currentDay]||'Repos';
  const exercises=EXERCICES[type]||[];
  const select=d=>{setCurrentDay(d);setSdata({})};
  const ensure=ei=>{if(!sdata[ei]){const ex=exercises[ei];const ns={...sdata};ns[ei]={sets:Array.from({length:ex.sets},()=>({kg:'',reps:'',done:false})),sensation:''};setSdata(ns)}};
  const upd=(ei,si,f,v)=>{ensure(ei);const ns={...sdata};if(!ns[ei])return;ns[ei]={...ns[ei],sets:ns[ei].sets.map((s,i)=>i===si?{...s,[f]:v}:s)};setSdata(ns)};
  const toggleDone=(ei,si)=>{ensure(ei);const ns={...sdata};ns[ei]={...ns[ei],sets:ns[ei].sets.map((s,i)=>i===si?{...s,done:!s.done}:s)};setSdata(ns)};
  const addSet=ei=>{ensure(ei);const ns={...sdata};ns[ei]={...ns[ei],sets:[...ns[ei].sets,{kg:'',reps:'',done:false}]};setSdata(ns)};
  const setSens=(ei,v)=>{ensure(ei);const ns={...sdata};ns[ei]={...ns[ei],sensation:ns[ei]?.sensation===v?'':v};setSdata(ns)};
  const save=()=>{
    const obj={date:todayStr(),type,exercises:exercises.map((ex,ei)=>({name:ex.name,sets:(sdata[ei]?.sets||[]).filter(s=>s.kg||s.reps),sensation:sdata[ei]?.sensation||''})).filter(e=>e.sets.length>0)};
    const filtered=sessions.filter(s=>!(s.date===todayStr()&&s.type===type));
    setSessions([...filtered,obj]);setSdata({});showToast('Séance enregistrée 💪')};
  return <div className="pg" id="page-sport">
    <div className="card">
      <div className="ct">Séance du jour</div>
      <WeekSelector currentDay={currentDay} prog={prog} onSelect={select}/>
      <span className={`bdg ${type.toLowerCase()}`}>{type}</span>
    </div>
    {type==='Repos'&&<div className="empty"><div style={{fontSize:36}}>😴</div><div>Jour de repos — récupère bien !</div></div>}
    {type!=='Repos'&&exercises.map((ex,ei)=>{
      const d=sdata[ei]||{sets:Array.from({length:ex.sets},()=>({kg:'',reps:'',done:false})),sensation:''};
      return <div key={ei} className="ex">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div><div style={{fontWeight:600,fontSize:12}}>{ex.name}</div>{ex.note&&<div style={{fontSize:9,color:'var(--t2)',marginTop:1}}>⚡ {ex.note}</div>}</div>
          <div style={{fontSize:9,color:'var(--t2)',fontFamily:'DM Mono'}}>{ex.sets}×{ex.reps}</div>
        </div>
        <div className="sh"><span/><span>KG</span><span>REPS</span><span>CIBLE</span><span>✓</span></div>
        {d.sets.map((s,si)=><div key={si} className="sr">
          <div className="sn">{si+1}</div>
          <input className="si" type="number" placeholder="kg" value={s.kg} onChange={e=>upd(ei,si,'kg',e.target.value)}/>
          <input className="si" type="number" placeholder="reps" value={s.reps} onChange={e=>upd(ei,si,'reps',e.target.value)}/>
          <input className="si" value={ex.reps} disabled style={{color:'var(--t3)',fontSize:9}}/>
          <button className={`sd ${s.done?'ok':''}`} onClick={()=>toggleDone(ei,si)}>{s.done?'✓':''}</button>
        </div>)}
        <button className="btn-s" style={{width:'100%',padding:4,background:'var(--bg4)',border:'1px dashed var(--b)',borderRadius:5,color:'var(--t3)',fontSize:9,marginTop:3,cursor:'pointer'}} onClick={()=>addSet(ei)}>+ Ajouter série</button>
        <div className="sens">
          {[['Facile','e','😊'],['OK','o','😤'],['Dur','d','😰'],['Max','m','💀']].map(([v,cls,ico])=>
            <button key={v} className={`sb ${d.sensation===v?cls:''}`} onClick={()=>setSens(ei,v)}>{ico} {v}</button>)}
        </div>
      </div>})}
    {type!=='Repos'&&<button className="btn btn-p btn-f" onClick={save}>✅ Enregistrer la séance</button>}
  </div>;
};

// ── Poids ──────────────────────────────────────────────
const Poids=({pid})=>{
  const [poids,setPoids]=useStore(pid,'poids',[]);
  const [obj]=useStore(pid,'objectifs',{poids_objectif:82});
  const [val,setVal]=useState('');const [date,setDate]=useState(todayStr());const [note,setNote]=useState('');
  const chartRef=useRef(null);
  const add=()=>{if(!val){showToast('Entre ton poids !');return}const p=[...poids,{val:parseFloat(val),date,note}].sort((a,b)=>a.date.localeCompare(b.date));setPoids(p);setVal('');setNote('');showToast('Poids enregistré ✅')};
  const del=d=>setPoids(poids.filter(p=>p.date!==d));
  useEffect(()=>drawLine(chartRef.current,poids.slice(-30),obj.poids_objectif),[poids,obj]);
  const last=poids.length>0?poids[poids.length-1]:null;
  const first=poids.length>0?poids[0]:null;
  const diff=last&&first?(last.val-first.val).toFixed(1):null;
  return <div className="pg" id="page-poids">
    <div className="card">
      <div className="ct">Enregistrer</div>
      <div className="g2">
        <div className="ig"><label className="il">Poids (kg)</label><input type="number" step="0.1" value={val} onChange={e=>setVal(e.target.value)} placeholder="74.9"/></div>
        <div className="ig"><label className="il">Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
      </div>
      <div className="ig"><label className="il">Note</label><input value={note} onChange={e=>setNote(e.target.value)} placeholder="Matin à jeun..."/></div>
      <button className="btn btn-p btn-f" onClick={add}>Enregistrer</button>
    </div>
    <div className="card">
      <div className="ct">Évolution</div>
      <canvas ref={chartRef}/>
      {last&&diff&&<div className="sg" style={{marginTop:10}}>
        <div className="sc"><div className="sv" style={{fontSize:20}}>{last.val}</div><div className="sl">Actuel (kg)</div></div>
        <div className="sc"><div className="sv" style={{fontSize:20,color:Number(diff)>0?'var(--ok)':'var(--err)'}}>{Number(diff)>0?'+':''}{diff}</div><div className="sl">Évolution</div></div>
      </div>}
    </div>
    <div className="card">
      <div className="ct">Historique</div>
      {poids.length===0&&<div className="empty"><div style={{fontSize:36}}>⚖️</div><div>Aucun poids enregistré</div></div>}
      {[...poids].reverse().slice(0,20).map((p,i,arr)=>{const prev=arr[i+1];const df=prev?(p.val-prev.val).toFixed(1):null;const sign=Number(df)>0?'+':'';
        return <div key={p.date} className="we">
          <div><div style={{fontSize:10,color:'var(--t2)'}}>{p.date}</div>{p.note&&<div style={{fontSize:9,color:'var(--t3)'}}>{p.note}</div>}</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {df&&<span style={{fontSize:10,fontFamily:'DM Mono',color:Number(df)>0?'var(--ok)':'var(--err)'}}>{sign}{df}</span>}
            <div style={{fontFamily:'Bebas Neue',fontSize:22,color:'var(--a)'}}>{p.val} kg</div>
            <button onClick={()=>del(p.date)} style={{background:'none',color:'var(--t3)',fontSize:14}}>×</button>
          </div>
        </div>})}
    </div>
  </div>;
};

// ── Profil ─────────────────────────────────────────────
const Profil=({pid,profile})=>{
  const [obj,setObj]=useStore(pid,'objectifs',{kcal:2800,prot:150,gluc:300,lip:80,water:2000,poids_objectif:82});
  const [info,setInfo]=useStore(pid,'profil_info',{});
  const [sessions]=useStore(pid,'sessions',[]);
  const [meals]=useStore(pid,'meals',{});
  const [bmr,setBmr]=useState('');
  const [poids]=useStore(pid,'poids',[]);
  const [form,setForm]=useState({age:info.age||'',taille:info.taille||'',sexe:info.sexe||'H',activite:info.activite||1.55});
  const [objForm,setObjForm]=useState({...obj});
  const calc=()=>{const {age,taille,sexe,activite}=form;if(!age||!taille){showToast('Renseigne âge et taille !');return}
    const lastP=poids.length>0?poids[poids.length-1].val:75;
    const b=sexe==='H'?10*lastP+6.25*taille-5*age+5:10*lastP+6.25*taille-5*age-161;
    const tdee=Math.round(b*activite);setBmr(`BMR: ${Math.round(b)} kcal · TDEE: ${tdee} kcal · Prise de masse: ${tdee+300}–${tdee+500} kcal/j`);setObjForm({...objForm,kcal:tdee+400})};
  const saveInfo=()=>{setInfo({...form});showToast('Profil sauvegardé ✅')};
  const saveObj=()=>{setObj({...objForm});showToast('Objectifs sauvegardés ✅')};
  const totalRepas=Object.values(meals).reduce((a,d)=>a+d.length,0);
  return <div className="pg" id="page-profil">
    <div className="card">
      <div className="ct">Profil</div>
      <div style={{textAlign:'center',marginBottom:14}}><div style={{fontSize:44,marginBottom:4}}>{profile.emoji}</div><div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:1}}>{profile.name}</div></div>
      <div className="g2">
        {[['age','Âge','number','28'],['taille','Taille (cm)','number','178']].map(([k,l,t,ph])=><div key={k} className="ig"><label className="il">{l}</label><input type={t} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} placeholder={ph}/></div>)}
        <div className="ig"><label className="il">Sexe</label><select value={form.sexe} onChange={e=>setForm({...form,sexe:e.target.value})}><option value="H">Homme</option><option value="F">Femme</option></select></div>
        <div className="ig"><label className="il">Activité</label><select value={form.activite} onChange={e=>setForm({...form,activite:Number(e.target.value)})}>
          <option value="1.2">Sédentaire</option><option value="1.375">Légèrement actif</option><option value="1.55">Modérément actif</option><option value="1.725">Très actif</option>
        </select></div>
      </div>
      <button className="btn btn-p btn-f" onClick={saveInfo}>Sauvegarder</button>
    </div>
    <div className="card">
      <div className="ct">Objectifs</div>
      {bmr&&<div style={{background:'var(--bg3)',borderRadius:8,padding:10,marginBottom:12,fontSize:11,color:'var(--t2)'}}>{bmr}</div>}
      <div className="g2">
        {[['kcal','Kcal/jour','2800'],['prot','Protéines (g)','150'],['gluc','Glucides (g)','300'],['lip','Lipides (g)','80'],['water','Eau (ml)','2000'],['poids_objectif','Poids objectif','82']].map(([k,l,ph])=><div key={k} className="ig"><label className="il">{l}</label><input type="number" step={k==='poids_objectif'?'0.1':'1'} value={objForm[k]||''} onChange={e=>setObjForm({...objForm,[k]:Number(e.target.value)||e.target.value})} placeholder={ph}/></div>)}
      </div>
      <button className="btn btn-s btn-sm" onClick={calc} style={{marginBottom:8}}>🧮 Calculer mon BMR</button>
      <button className="btn btn-p btn-f" onClick={saveObj}>Sauvegarder objectifs</button>
    </div>
    <div className="card">
      <div className="ct">Stats globales</div>
      <div className="sg">
        <div className="sc"><div className="sv">{sessions.length}</div><div className="sl">Séances totales</div></div>
        <div className="sc"><div className="sv">{totalRepas}</div><div className="sl">Repas enregistrés</div></div>
      </div>
    </div>
  </div>;
};

// ── NewProfileModal ────────────────────────────────────
const NewProfileModal=({open,onClose,onCreate})=>{
  const [name,setName]=useState('');const [emoji,setEmoji]=useState(EMOJIS[0]);const [color,setColor]=useState(COLORS[0]);
  if(!open)return null;
  return <div className="ov on"><div className="mo">
    <div className="mot">NOUVEAU PROFIL</div>
    <div className="ig"><label className="il">Prénom</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Ton prénom"/></div>
    <div className="ig"><label className="il">Avatar</label><div className="epg">{EMOJIS.map(e=><div key={e} className={`eo ${e===emoji?'on':''}`} onClick={()=>setEmoji(e)}>{e}</div>)}</div></div>
    <div className="ig"><label className="il">Couleur</label><div className="cpg">{COLORS.map(c=><div key={c} className={`co ${c===color?'on':''}`} onClick={()=>setColor(c)} style={{background:c}}/></div>)}</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
      <button className="btn btn-s" onClick={onClose}>Annuler</button>
      <button className="btn btn-p" onClick={()=>{if(!name.trim()){showToast('Entre un prénom !');return}onCreate({id:Date.now().toString(),name:name.trim(),emoji,color});onClose()}}>Créer</button>
    </div>
  </div></div>;
};

// ── App ────────────────────────────────────────────────
const App=()=>{
  const [profiles,setProfiles]=useState(()=>JSON.parse(localStorage.getItem('ft_profiles')||'[]'));
  const [pid,setPid]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const [currentDay,setCurrentDay]=useState(new Date().getDay());
  const [showNew,setShowNew]=useState(false);
  const profile=profiles.find(p=>p.id===pid)||null;
  const login=p=>{setPid(p.id);setTab('dashboard')};
  const logout=()=>{setPid(null);setTab('dashboard')};
  const createProfile=p=>{const ps=[...profiles,p];setProfiles(ps);localStorage.setItem('ft_profiles',JSON.stringify(ps));showToast('Profil créé 🎉')};
  const deleteProfile=(id,e)=>{e.stopPropagation();if(!confirm('Supprimer ce profil ?'))return;localStorage.removeItem('ft_'+id);const ps=profiles.filter(p=>p.id!==id);setProfiles(ps);localStorage.setItem('ft_profiles',JSON.stringify(ps))};
  const d=new Date();
  const TABS=[{k:'dashboard',i:'🏠',l:'Accueil'},{k:'nutrition',i:'🍽',l:'Nutrition'},{k:'eau',i:'💧',l:'Eau'},{k:'sport',i:'💪',l:'Sport'},{k:'poids',i:'⚖️',l:'Poids'},{k:'profil',i:'👤',l:'Profil'}];
  if(!pid)return <>
    <div id="login">
      <div style={{fontFamily:'Bebas Neue',fontSize:52,letterSpacing:4,color:'var(--a)',lineHeight:1}}>FITTRACKER</div>
      <div style={{fontSize:10,letterSpacing:3,textTransform:'uppercase',color:'var(--t2)',marginBottom:40}}>Sport &amp; Nutrition Pro</div>
      <div className="pg2">
        {profiles.map((p,i)=>{
          const d2=JSON.parse(localStorage.getItem('ft_'+p.id)||'{}');
          const nb=(d2.sessions||[]).length;const pw=d2.poids||[];const lp=pw.length>0?pw[pw.length-1].val+' kg':'-- kg';
          return <div key={p.id} className="pc" onClick={()=>login(p)}>
            <button className="profile-delete" onClick={e=>deleteProfile(p.id,e)} style={{position:'absolute',top:6,right:6,width:18,height:18,borderRadius:'50%',background:'var(--bg4)',color:'var(--t3)',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>×</button>
            <div className="pa" style={{background:p.color+'20',borderColor:p.color}}>{p.emoji}</div>
            <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{p.name}</div>
            <div style={{fontSize:9,color:'var(--t2)'}}>{nb} séances · {lp}</div>
          </div>})}
      </div>
      <div className="apc" onClick={()=>setShowNew(true)}><div style={{fontSize:26,marginBottom:6}}>+</div>Nouveau profil</div>
    </div>
    <NewProfileModal open={showNew} onClose={()=>setShowNew(false)} onCreate={createProfile}/>
  </>;
  return <div className="app">
    <div className="hdr">
      <div style={{display:'flex',alignItems:'center'}}>
        <div className="hav" style={{borderColor:profile?.color}}>{profile?.emoji}</div>
        <div><div style={{fontWeight:700,fontSize:13}}>{profile?.name}</div>
          <div style={{fontSize:9,color:'var(--t2)',fontFamily:'DM Mono'}}>{DAYS_FR[d.getDay()]} {d.getDate()} {MONTHS_FR[d.getMonth()]} {d.getFullYear()}</div>
        </div>
      </div>
      <button className="logout-btn" onClick={logout}>⬅ Profils</button>
    </div>
    <div className="body">
      <div style={{maxWidth:600,margin:'0 auto'}}>
        {tab==='dashboard'&&<Dashboard pid={pid} currentDay={currentDay} setCurrentDay={setCurrentDay}/>}
        {tab==='nutrition'&&<Nutrition pid={pid}/>}
        {tab==='eau'&&<Eau pid={pid}/>}
        {tab==='sport'&&<Sport pid={pid} currentDay={currentDay} setCurrentDay={setCurrentDay}/>}
        {tab==='poids'&&<Poids pid={pid}/>}
        {tab==='profil'&&profile&&<Profil pid={pid} profile={profile}/>}
      </div>
    </div>
    <div className="bnav">
      {TABS.map(t=><button key={t.k} className={`bn ${tab===t.k?'on':''}`} onClick={()=>setTab(t.k)}><span className="i">{t.i}</span>{t.l}</button>)}
    </div>
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
